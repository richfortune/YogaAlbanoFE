# Configuration for Netlify Deployment of YogaAlbano

[[headers]]
  # Cache rules for static assets (1 year for CSS/JS, 7 days for images)
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  # Global security headers
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# REDIRECTS SETUP (Optional/Safe Template)
# Se conosci il sottodominio Netlify ufficiale (es. yogaalbano.netlify.app),
# scommenta le righe sottostanti per forzare il redirect al dominio canonico:
#
# [[redirects]]
#   from = "https://yogaalbano.netlify.app/*"
#   to = "https://www.yogaalbano.it/:splat"
#   status = 301
#   force = true
